<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bitácora v2.0</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: #e2e8f0;
    padding: 20px;
}

.container {
    max-width: 800px;
    margin: auto;
}

input, textarea, select, button {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
}

button {
    background: #22c55e;
    cursor: pointer;
}

.registro {
    margin-top: 10px;
    padding: 10px;
    background: rgba(255,255,255,0.05);
}

.fecha {
    font-size: 12px;
    color: #94a3b8;
}

.version {
    text-align: center;
    font-size: 12px;
    margin-bottom: 20px;
}
</style>
</head>

<body>

<div class="container">

<h1>Bitácora</h1>
<div id="versionInfo" class="version"></div>

<h3>Crear Proyecto</h3>
<input id="nuevoProyecto">
<button onclick="crearProyecto()">Crear</button>

<hr>

<h3>Seleccionar Proyecto</h3>
<select id="proyectoSelect"></select>
<button onclick="exportarExcel()">Descargar Excel</button>

<hr>

<h3>Nuevo Registro</h3>
<textarea id="observacion" placeholder="Observación"></textarea>
<textarea id="tarea" placeholder="Tarea"></textarea>
<textarea id="dolores" placeholder="Dolores"></textarea>
<input id="anexos" placeholder="Anexos">

<button onclick="guardarRegistro()">Guardar</button>

<hr>

<div id="lista"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import {
    getFirestore,
    collection,
    addDoc,
    getDocs,
    query,
    where,
    orderBy,
    serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSy...",
    authDomain: "bitacora-8f4ce.firebaseapp.com",
    projectId: "bitacora-8f4ce",
    storageBucket: "bitacora-8f4ce.firebasestorage.app",
    messagingSenderId: "270773053654",
    appId: "1:270773053654:web:953528165c86f79e638177"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// =======================
// VERSION
// =======================
document.getElementById("versionInfo").innerText =
    "Versión 2.0 | " + new Date().toLocaleString();

// =======================
// CREAR PROYECTO
// =======================
window.crearProyecto = async () => {
    const nombre = document.getElementById("nuevoProyecto").value;
    if (!nombre) return;

    await addDoc(collection(db, "proyectos"), {
        nombre,
        fechaCreacion: serverTimestamp()
    });

    document.getElementById("nuevoProyecto").value = "";
    cargarProyectos();
};

// =======================
// CARGAR PROYECTOS
// =======================
async function cargarProyectos() {
    const select = document.getElementById("proyectoSelect");
    select.innerHTML = "";

    const snapshot = await getDocs(collection(db, "proyectos"));

    snapshot.forEach(doc => {
        const option = document.createElement("option");
        option.value = doc.id;
        option.textContent = doc.data().nombre;
        select.appendChild(option);
    });

    // 🔴 Carga automática del primero
    cargarRegistros();
}

// =======================
// GUARDAR REGISTRO
// =======================
window.guardarRegistro = async () => {

    const proyectoId = document.getElementById("proyectoSelect").value;

    if (!proyectoId) {
        alert("Selecciona un proyecto");
        return;
    }

    await addDoc(collection(db, "bitacora"), {
        proyectoId,
        observacion: document.getElementById("observacion").value || null,
        tarea: document.getElementById("tarea").value || null,
        dolores: document.getElementById("dolores").value || null,
        anexos: document.getElementById("anexos").value || null,
        fecha: serverTimestamp()
    });

    limpiar();
    cargarRegistros();
};

function limpiar() {
    document.getElementById("observacion").value = "";
    document.getElementById("tarea").value = "";
    document.getElementById("dolores").value = "";
    document.getElementById("anexos").value = "";
}

// =======================
// CARGAR REGISTROS (CLAVE)
// =======================
async function cargarRegistros() {

    const lista = document.getElementById("lista");
    lista.innerHTML = "Cargando...";

    const proyectoId = document.getElementById("proyectoSelect").value;
    if (!proyectoId) return;

    try {
        const q = query(
            collection(db, "bitacora"),
            where("proyectoId", "==", proyectoId),
            orderBy("fecha", "desc")
        );

        const snapshot = await getDocs(q);

        lista.innerHTML = "";

        if (snapshot.empty) {
            lista.innerHTML = "No hay registros para este proyecto";
            return;
        }

        snapshot.forEach(doc => {
            const d = doc.data();

            const fecha = d.fecha?.seconds
                ? new Date(d.fecha.seconds * 1000).toLocaleString()
                : "";

            const div = document.createElement("div");
            div.className = "registro";

            div.innerHTML = `
                <div class="fecha">${fecha}</div>
                ${d.observacion ? `<b>Obs:</b> ${d.observacion}<br>` : ""}
                ${d.tarea ? `<b>Tarea:</b> ${d.tarea}<br>` : ""}
                ${d.dolores ? `<b>Dolores:</b> ${d.dolores}<br>` : ""}
                ${d.anexos ? `<b>Anexos:</b> <a href="${d.anexos}" target="_blank">Ver</a>` : ""}
            `;

            lista.appendChild(div);
        });

    } catch (error) {
        console.error(error);
        lista.innerHTML = "Error cargando datos (revisa consola F12)";
    }
}

// 🔴 IMPORTANTE: evento de cambio
document.getElementById("proyectoSelect")
    .addEventListener("change", cargarRegistros);

// INIT
cargarProyectos();

</script>

</body>
</html>
