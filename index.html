<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bitácora v2.0</title>

<style>
body {
    font-family: "Segoe UI", Arial;
    background: #f5f7fa;
    margin: 0;
}

.header {
    background: white;
    padding: 15px 30px;
    border-bottom: 1px solid #e5e7eb;
}

.container {
    max-width: 900px;
    margin: 30px auto;
}

.card {
    background: white;
    padding: 20px;
    margin-bottom: 20px;
    border: 1px solid #e5e7eb;
    border-radius: 8px;
}

input, textarea, select {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    border: 1px solid #d1d5db;
    border-radius: 6px;
}

button {
    margin-top: 10px;
    padding: 10px;
    background: #065f46;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

.registro {
    padding: 12px;
    border-bottom: 1px solid #e5e7eb;
    position: relative;
}

.completado {
    background: #dcfce7;
    border-left: 4px solid #16a34a;
}

.check-btn {
    position: absolute;
    right: 10px;
    top: 10px;
    width: 28px;
    height: 28px;
}

.filtros {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="header">
<h2>Bitácora v2.0</h2>
</div>

<div class="container">

<div class="card">
<h3>Filtros</h3>

<div class="filtros">
<label>
<input type="checkbox" id="filtroCompletados">
 Solo completados
</label>

<input id="filtroTarea" placeholder="Buscar en tarea...">
</div>

</div>

<div class="card">
<h3>Registros</h3>
<div id="lista"></div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import {
getFirestore, collection, getDocs,
query, where, updateDoc, doc
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const app = initializeApp({
apiKey: "AIzaSy...",
projectId: "bitacora-8f4ce"
});

const db = getFirestore(app);

let registrosCache = []; // 🔴 cache local

function getPrioridad(d){
if(d.importancia==="Alta" && d.urgencia==="Alta") return 1;
if(d.importancia==="Alta" && d.urgencia==="Media") return 2;
if(d.importancia==="Alta" && d.urgencia==="Baja") return 3;
if(d.importancia==="Media" && d.urgencia==="Alta") return 4;
if(d.importancia==="Media" && d.urgencia==="Media") return 5;
if(d.importancia==="Baja") return 6;
return 7;
}

// 🔴 CARGAR DATOS UNA VEZ
async function cargarRegistros(){

const q=query(collection(db,"bitacora"));
const snap=await getDocs(q);

registrosCache=[];
snap.forEach(d=>registrosCache.push({id:d.id,...d.data()}));

aplicarFiltros();
}

// 🔴 APLICAR FILTROS
function aplicarFiltros(){

let datos=[...registrosCache];

const soloCompletados = document.getElementById("filtroCompletados").checked;
const textoTarea = document.getElementById("filtroTarea").value.toLowerCase();

if(soloCompletados){
datos = datos.filter(d=>d.completado===true);
}

if(textoTarea){
datos = datos.filter(d=>
(d.tarea || "").toLowerCase().includes(textoTarea)
);
}

// ORDEN
datos.sort((a,b)=>{
const pA=getPrioridad(a);
const pB=getPrioridad(b);
if(pA!==pB) return pA-pB;

if(!a.fechaCompromiso) return 1;
if(!b.fechaCompromiso) return -1;

return new Date(a.fechaCompromiso)-new Date(b.fechaCompromiso);
});

render(datos);
}

// 🔴 RENDER
function render(datos){

const lista=document.getElementById("lista");
lista.innerHTML="";

if(datos.length===0){
lista.innerHTML="No hay registros";
return;
}

datos.forEach(d=>{
const div=document.createElement("div");
div.className="registro";

if(d.completado) div.classList.add("completado");

div.innerHTML=`
<button onclick="toggleCheck('${d.id}',${d.completado})">✔</button>

<b>${d.fechaCompromiso || "Sin fecha"}</b><br>
${d.tarea || ""}
`;

lista.appendChild(div);
});
}

// 🔴 CHECK
window.toggleCheck = async(id,estado)=>{
await updateDoc(doc(db,"bitacora",id),{
completado:!estado
});

// actualizar cache sin recargar todo
const index = registrosCache.findIndex(r=>r.id===id);
registrosCache[index].completado = !estado;

aplicarFiltros();
};

// EVENTOS FILTRO
document.getElementById("filtroCompletados")
.addEventListener("change", aplicarFiltros);

document.getElementById("filtroTarea")
.addEventListener("input", aplicarFiltros);

// INIT
cargarRegistros();

</script>

</body>
</html>
