<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bitácora v2.0</title>

<style>
body {
    font-family: "Segoe UI", Arial, sans-serif;
    background: #f5f7fa;
    color: #1f2937;
    margin: 0;
}

.header {
    background: white;
    padding: 15px 30px;
    border-bottom: 1px solid #e5e7eb;
}

.version {
    font-size: 12px;
    color: #6b7280;
}

.container {
    max-width: 900px;
    margin: 30px auto;
    padding: 0 20px;
}

.card {
    background: white;
    padding: 20px;
    margin-bottom: 20px;
    border-radius: 8px;
    border: 1px solid #e5e7eb;
}

input, textarea, select {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    border: 1px solid #d1d5db;
    border-radius: 6px;
}

button {
    margin-top: 10px;
    padding: 10px;
    background: #065f46;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

button.secondary {
    background: #e5e7eb;
    color: #111827;
}

.registro {
    border-bottom: 1px solid #e5e7eb;
    padding: 10px 0;
}

.fecha {
    font-size: 12px;
    color: #6b7280;
}
</style>
</head>

<body>

<div class="header">
    <h1>Bitácora</h1>
    <div id="versionInfo" class="version"></div>
</div>

<div class="container">

<div class="card">
    <h3>Crear Proyecto</h3>
    <input id="nuevoProyecto" placeholder="Nombre del proyecto">
    <button onclick="crearProyecto()">Crear proyecto</button>
</div>

<div class="card">
    <h3>Proyecto</h3>
    <select id="proyectoSelect"></select>
    <button class="secondary" onclick="exportarExcel()">Descargar Excel</button>
</div>

<div class="card">
    <h3>Nuevo Registro</h3>

    <textarea id="observacion" placeholder="Observación"></textarea>
    <textarea id="tarea" placeholder="Tarea"></textarea>
    <textarea id="dolores" placeholder="Ampliación de dolores"></textarea>

    <label>Fecha de compromiso</label>
    <input type="date" id="fechaCompromiso">

    <label>Urgencia</label>
    <select id="urgencia">
        <option value="">Seleccionar</option>
        <option value="Baja">Baja</option>
        <option value="Media">Media</option>
        <option value="Alta">Alta</option>
    </select>

    <label>Importancia</label>
    <select id="importancia">
        <option value="">Seleccionar</option>
        <option value="Baja">Baja</option>
        <option value="Media">Media</option>
        <option value="Alta">Alta</option>
    </select>

    <input id="anexos" placeholder="Link de anexos">

    <button onclick="guardarRegistro()">Guardar registro</button>
</div>

<div class="card">
    <h3>Registros</h3>
    <div id="lista"></div>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import {
    getFirestore, collection, addDoc, getDocs, query, where, serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSy...",
    authDomain: "bitacora-8f4ce.firebaseapp.com",
    projectId: "bitacora-8f4ce",
    storageBucket: "bitacora-8f4ce.firebasestorage.app",
    messagingSenderId: "270773053654",
    appId: "1:270773053654:web:953528165c86f79e638177"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// VERSION
document.getElementById("versionInfo").innerText =
    "Versión 2.0 | " + new Date().toLocaleString();

// CREAR PROYECTO
window.crearProyecto = async () => {
    const nombre = document.getElementById("nuevoProyecto").value.trim();
    if (!nombre) return;

    await addDoc(collection(db, "proyectos"), {
        nombre,
        fechaCreacion: serverTimestamp()
    });

    document.getElementById("nuevoProyecto").value = "";
    cargarProyectos();
};

// CARGAR PROYECTOS
async function cargarProyectos() {
    const select = document.getElementById("proyectoSelect");
    select.innerHTML = "";

    const snapshot = await getDocs(collection(db, "proyectos"));

    snapshot.forEach(doc => {
        const option = document.createElement("option");
        option.value = doc.id;
        option.textContent = doc.data().nombre;
        select.appendChild(option);
    });

    cargarRegistros();
}

// GUARDAR REGISTRO
window.guardarRegistro = async () => {

    const proyectoId = document.getElementById("proyectoSelect").value;

    await addDoc(collection(db, "bitacora"), {
        proyectoId,
        observacion: document.getElementById("observacion").value || null,
        tarea: document.getElementById("tarea").value || null,
        dolores: document.getElementById("dolores").value || null,
        fechaCompromiso: document.getElementById("fechaCompromiso").value || null,
        urgencia: document.getElementById("urgencia").value || null,
        importancia: document.getElementById("importancia").value || null,
        anexos: document.getElementById("anexos").value || null,
        fecha: serverTimestamp()
    });

    limpiar();
    cargarRegistros();
};

function limpiar() {
    document.getElementById("observacion").value = "";
    document.getElementById("tarea").value = "";
    document.getElementById("dolores").value = "";
    document.getElementById("fechaCompromiso").value = "";
    document.getElementById("urgencia").value = "";
    document.getElementById("importancia").value = "";
    document.getElementById("anexos").value = "";
}

// CARGAR REGISTROS (MOSTRANDO TODO)
async function cargarRegistros() {

    const lista = document.getElementById("lista");
    lista.innerHTML = "Cargando...";

    const proyectoId = document.getElementById("proyectoSelect").value;

    if (!proyectoId) {
        lista.innerHTML = "No hay registros";
        return;
    }

    const q = query(
        collection(db, "bitacora"),
        where("proyectoId", "==", proyectoId)
    );

    const snapshot = await getDocs(q);

    let docs = [];
    snapshot.forEach(doc => docs.push(doc.data()));

    docs.sort((a, b) => (b.fecha?.seconds || 0) - (a.fecha?.seconds || 0));

    if (docs.length === 0) {
        lista.innerHTML = "No hay registros para este proyecto";
        return;
    }

    lista.innerHTML = "";

    docs.forEach(d => {
        const fecha = d.fecha?.seconds
            ? new Date(d.fecha.seconds * 1000).toLocaleString()
            : "";

        const div = document.createElement("div");
        div.className = "registro";

        div.innerHTML = `
            <div class="fecha">${fecha}</div>

            ${d.observacion ? `<b>Observación:</b> ${d.observacion}<br>` : ""}
            ${d.tarea ? `<b>Tarea:</b> ${d.tarea}<br>` : ""}
            ${d.dolores ? `<b>Dolores:</b> ${d.dolores}<br>` : ""}

            ${d.fechaCompromiso ? `<b>Fecha compromiso:</b> ${d.fechaCompromiso}<br>` : ""}

            ${d.urgencia ? `<b>Urgencia:</b> ${d.urgencia}<br>` : ""}
            ${d.importancia ? `<b>Importancia:</b> ${d.importancia}<br>` : ""}

            ${d.anexos ? `<b>Anexos:</b> <a href="${d.anexos}" target="_blank">Ver enlace</a>` : ""}
        `;

        lista.appendChild(div);
    });
}

// EXPORTAR EXCEL
window.exportarExcel = async function () {

    const select = document.getElementById("proyectoSelect");
    const proyectoId = select.value;
    const nombreProyecto = select.options[select.selectedIndex]?.text || "proyecto";

    if (!proyectoId) {
        alert("Selecciona un proyecto");
        return;
    }

    const q = query(
        collection(db, "bitacora"),
        where("proyectoId", "==", proyectoId)
    );

    const snapshot = await getDocs(q);

    let datos = [];

    snapshot.forEach(doc => {
        const d = doc.data();

        datos.push({
            Proyecto: nombreProyecto,
            Fecha: d.fecha?.seconds ? new Date(d.fecha.seconds * 1000).toLocaleString() : "",
            Observación: d.observacion || "",
            Tarea: d.tarea || "",
            Dolores: d.dolores || "",
            "Fecha Compromiso": d.fechaCompromiso || "",
            Urgencia: d.urgencia || "",
            Importancia: d.importancia || "",
            Anexos: d.anexos || ""
        });
    });

    if (datos.length === 0) {
        alert("No hay datos para exportar");
        return;
    }

    const ws = XLSX.utils.json_to_sheet(datos);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Bitacora");

    const nombreArchivo = nombreProyecto
        .replace(/[^a-zA-Z0-9]/g, "_")
        .toLowerCase();

    XLSX.writeFile(wb, `${nombreArchivo}_bitacora.xlsx`);
};

document.getElementById("proyectoSelect")
    .addEventListener("change", cargarRegistros);

cargarProyectos();

</script>

</body>
</html>
