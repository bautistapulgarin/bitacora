<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bitácora v2.0 - Múltiples Proyectos</title>

<style>
body {
    font-family: "Segoe UI", Arial;
    background: #f5f7fa;
    margin: 0;
}

.header {
    background: white;
    padding: 15px 30px;
    border-bottom: 1px solid #e5e7eb;
}

.container {
    max-width: 900px;
    margin: 30px auto;
}

.card {
    background: white;
    padding: 20px;
    margin-bottom: 20px;
    border: 1px solid #e5e7eb;
    border-radius: 8px;
}

input, textarea, select {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    border: 1px solid #d1d5db;
    border-radius: 6px;
    box-sizing: border-box;
}

button {
    margin-top: 10px;
    padding: 10px;
    background: #065f46;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

button:hover {
    background: #047857;
}

button:active {
    transform: scale(0.98);
}

.lista-proyectos {
    max-height: 200px;
    overflow-y: auto;
    border: 1px solid #d1d5db;
    border-radius: 6px;
    margin-top: 8px;
    background: white;
}

.item-proyecto {
    padding: 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid #f0f0f0;
}

.item-proyecto:hover {
    background: #f9fafb;
}

.item-proyecto input[type="checkbox"] {
    width: 18px;
    height: 18px;
    margin: 0;
    cursor: pointer;
}

.item-proyecto label {
    cursor: pointer;
    flex: 1;
    margin: 0;
}

.proyecto-seleccionado {
    background: #e0f2fe;
}

.registro {
    padding: 12px;
    border-bottom: 1px solid #e5e7eb;
    position: relative;
}

.completado {
    background: #dcfce7;
    border-left: 4px solid #16a34a;
}

.check-btn {
    position: absolute;
    right: 10px;
    top: 10px;
    border: none;
    border-radius: 50%;
    width: 28px;
    height: 28px;
    cursor: pointer;
    background: #e5e7eb;
    color: #6b7280;
}

.check-btn.activo {
    background: #16a34a;
    color: white;
}

.prioridad {
    font-weight: bold;
    font-size: 12px;
    margin-bottom: 5px;
}

.proyecto-tag {
    display: inline-block;
    background: #e0e7ff;
    color: #3730a3;
    padding: 2px 8px;
    border-radius: 12px;
    font-size: 11px;
    margin-bottom: 5px;
}

.filtros-acciones {
    display: flex;
    gap: 10px;
    margin-top: 10px;
}

.btn-secundario {
    background: #6b7280;
}

.btn-secundario:hover {
    background: #4b5563;
}

.btn-peligro {
    background: #dc2626;
}

.btn-peligro:hover {
    background: #b91c1c;
}

.resumen {
    background: #f3f4f6;
    padding: 10px;
    border-radius: 6px;
    margin-top: 10px;
    font-size: 14px;
}

.empty-state {
    text-align: center;
    padding: 40px;
    color: #9ca3af;
}

/* Estilos para el selector de proyecto con búsqueda */
.proyecto-selector-container {
    position: relative;
    margin-bottom: 15px;
}

.proyecto-search-input {
    width: 100%;
    padding: 10px;
    border: 1px solid #d1d5db;
    border-radius: 6px;
    box-sizing: border-box;
    font-size: 14px;
}

.proyecto-dropdown {
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    max-height: 200px;
    overflow-y: auto;
    background: white;
    border: 1px solid #d1d5db;
    border-radius: 6px;
    margin-top: 4px;
    z-index: 1000;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
}

.proyecto-option {
    padding: 10px;
    cursor: pointer;
    border-bottom: 1px solid #f0f0f0;
}

.proyecto-option:hover {
    background: #f3f4f6;
}

.proyecto-option.seleccionado {
    background: #e0f2fe;
    font-weight: bold;
}

.proyecto-seleccionado-display {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px;
    background: #f9fafb;
    border: 1px solid #d1d5db;
    border-radius: 6px;
    cursor: pointer;
}

.proyecto-seleccionado-display:hover {
    background: #f3f4f6;
}

.limpiar-seleccion {
    background: none;
    border: none;
    color: #6b7280;
    cursor: pointer;
    font-size: 18px;
    margin: 0;
    padding: 0 5px;
}

.limpiar-seleccion:hover {
    color: #dc2626;
    transform: none;
}
</style>
</head>

<body>

<div class="header">
    <h2>Bitácora v2.0 - Múltiples Proyectos</h2>
</div>

<div class="container">

<div class="card">
<h3>Crear Proyecto</h3>
<input id="nuevoProyecto" placeholder="Nombre del proyecto">
<button onclick="crearProyecto()">Crear Proyecto</button>
</div>

<div class="card">
<h3>Seleccionar Proyectos para Visualizar</h3>
<input id="busquedaProyecto" placeholder="Buscar proyecto...">
<div id="listaProyectos" class="lista-proyectos"></div>
<div class="filtros-acciones">
    <button onclick="seleccionarTodos()" class="btn-secundario" style="flex:1">Seleccionar Todos</button>
    <button onclick="deseleccionarTodos()" class="btn-secundario" style="flex:1">Deseleccionar Todos</button>
</div>
<div id="resumenProyectos" class="resumen"></div>
<button onclick="exportarExcel()">Descargar Excel (Proyectos Seleccionados)</button>
</div>

<div class="card">
<h3>Nuevo Registro</h3>
<label>Seleccionar Proyecto</label>
<div class="proyecto-selector-container">
    <input type="text" id="busquedaProyectoNuevo" class="proyecto-search-input" placeholder="Buscar proyecto...">
    <div id="dropdownProyectos" class="proyecto-dropdown" style="display: none;"></div>
    <div id="proyectoSeleccionadoDisplay" class="proyecto-seleccionado-display" style="display: none;">
        <span id="proyectoSeleccionadoNombre"></span>
        <button class="limpiar-seleccion" onclick="limpiarSeleccionProyecto()">✕</button>
    </div>
</div>

<textarea id="observacion" placeholder="Observación"></textarea>
<textarea id="tarea" placeholder="Tarea"></textarea>
<textarea id="dolores" placeholder="Dolores"></textarea>

<label>Fecha compromiso</label>
<input type="date" id="fechaCompromiso">

<label>Urgencia</label>
<select id="urgencia">
<option value="">Seleccionar</option>
<option>Baja</option>
<option>Media</option>
<option>Alta</option>
</select>

<label>Importancia</label>
<select id="importancia">
<option value="">Seleccionar</option>
<option>Baja</option>
<option>Media</option>
<option>Alta</option>
</select>

<input id="anexos" placeholder="Anexos (URL)">

<button onclick="guardarRegistro()">Guardar Registro</button>
</div>

<div class="card">
<h3>Filtros</h3>
<label>
<input type="checkbox" id="filtroCompletados">
 Mostrar solo completados
</label>
<input id="filtroTarea" placeholder="Filtrar por tarea...">
</div>

<div class="card">
<h3>Registros de Proyectos Seleccionados</h3>
<div id="lista"></div>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import {
getFirestore, collection, addDoc, getDocs,
query, where, serverTimestamp, updateDoc, doc
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const app = initializeApp({
apiKey: "AIzaSy...", // Reemplaza con tu API key
projectId: "bitacora-8f4ce"
});

const db = getFirestore(app);

let proyectos = [];
let proyectosSeleccionados = new Map(); // Map de id -> objeto proyecto
let registrosDeProyectos = []; // Todos los registros de proyectos seleccionados
let proyectoSeleccionadoNuevo = null; // Para el nuevo registro

// PRIORIDAD
function getPrioridad(d){
    const u = d.urgencia;
    const i = d.importancia;

    if(i==="Alta" && u==="Alta") return 1;
    if(i==="Alta" && u==="Media") return 2;
    if(i==="Alta" && u==="Baja") return 3;
    if(i==="Media" && u==="Alta") return 4;
    if(i==="Media" && u==="Media") return 5;
    if(i==="Baja") return 6;
    return 7;
}

// CREAR PROYECTO
window.crearProyecto = async ()=>{
const nombre = document.getElementById("nuevoProyecto").value.trim();
if(!nombre) {
    alert("Ingresa un nombre para el proyecto");
    return;
}

await addDoc(collection(db,"proyectos"),{
    nombre,
    fechaCreacion: serverTimestamp()
});

document.getElementById("nuevoProyecto").value="";
cargarProyectos();
};

// CARGAR PROYECTOS
async function cargarProyectos(){
const snap = await getDocs(collection(db,"proyectos"));
proyectos=[];
snap.forEach(d=>proyectos.push({id:d.id,...d.data()}));
renderProyectos(proyectos);
actualizarDropdownProyectos();
}

// RENDER PROYECTOS CON CHECKBOX
function renderProyectos(lista){
const cont = document.getElementById("listaProyectos");
cont.innerHTML="";

if(lista.length === 0){
    cont.innerHTML = '<div style="padding: 10px; color: #9ca3af;">No hay proyectos</div>';
    return;
}

lista.forEach(p=>{
const div=document.createElement("div");
div.className="item-proyecto";
if(proyectosSeleccionados.has(p.id)){
    div.classList.add("proyecto-seleccionado");
}

const checkbox = document.createElement("input");
checkbox.type = "checkbox";
checkbox.checked = proyectosSeleccionados.has(p.id);
checkbox.onchange = (e) => {
    e.stopPropagation();
    if(checkbox.checked){
        proyectosSeleccionados.set(p.id, p);
    } else {
        proyectosSeleccionados.delete(p.id);
    }
    actualizarResumen();
    cargarRegistrosMultiples();
    renderProyectos(proyectos);
};

const label = document.createElement("label");
label.textContent = p.nombre;
label.onclick = () => {
    checkbox.checked = !checkbox.checked;
    if(checkbox.checked){
        proyectosSeleccionados.set(p.id, p);
    } else {
        proyectosSeleccionados.delete(p.id);
    }
    actualizarResumen();
    cargarRegistrosMultiples();
    renderProyectos(proyectos);
};

div.appendChild(checkbox);
div.appendChild(label);
cont.appendChild(div);
});

actualizarResumen();
}

// ACTUALIZAR RESUMEN
function actualizarResumen(){
const resumen = document.getElementById("resumenProyectos");
const count = proyectosSeleccionados.size;
if(count === 0){
    resumen.innerHTML = "No hay proyectos seleccionados";
} else {
    const nombres = Array.from(proyectosSeleccionados.values()).map(p => p.nombre).join(", ");
    resumen.innerHTML = `<strong>${count} proyecto(s) seleccionado(s):</strong> ${nombres}`;
}
cargarRegistrosMultiples();
}

// SELECCIONAR TODOS
window.seleccionarTodos = () => {
proyectos.forEach(p => {
    proyectosSeleccionados.set(p.id, p);
});
actualizarResumen();
renderProyectos(proyectos);
};

// DESELECCIONAR TODOS
window.deseleccionarTodos = () => {
proyectosSeleccionados.clear();
actualizarResumen();
renderProyectos(proyectos);
};

// ACTUALIZAR DROPDOWN PARA NUEVO REGISTRO
function actualizarDropdownProyectos(){
const dropdown = document.getElementById("dropdownProyectos");
dropdown.innerHTML = "";

if(proyectos.length === 0){
    const div = document.createElement("div");
    div.className = "proyecto-option";
    div.textContent = "No hay proyectos disponibles";
    dropdown.appendChild(div);
    return;
}

proyectos.forEach(p => {
    const div = document.createElement("div");
    div.className = "proyecto-option";
    if(proyectoSeleccionadoNuevo && proyectoSeleccionadoNuevo.id === p.id){
        div.classList.add("seleccionado");
    }
    div.textContent = p.nombre;
    div.onclick = () => {
        seleccionarProyectoNuevo(p);
    };
    dropdown.appendChild(div);
});
}

// FILTRAR DROPDOWN
function filtrarDropdownProyectos() {
const searchText = document.getElementById("busquedaProyectoNuevo").value.toLowerCase();
const dropdown = document.getElementById("dropdownProyectos");
const opciones = dropdown.querySelectorAll(".proyecto-option");

opciones.forEach(opcion => {
    const nombre = opcion.textContent.toLowerCase();
    if(nombre.includes(searchText)) {
        opcion.style.display = "block";
    } else {
        opcion.style.display = "none";
    }
});
}

// SELECCIONAR PROYECTO PARA NUEVO REGISTRO
function seleccionarProyectoNuevo(proyecto) {
proyectoSeleccionadoNuevo = proyecto;
document.getElementById("proyectoSeleccionadoNombre").textContent = proyecto.nombre;
document.getElementById("proyectoSeleccionadoDisplay").style.display = "flex";
document.getElementById("busquedaProyectoNuevo").style.display = "none";
document.getElementById("dropdownProyectos").style.display = "none";
document.getElementById("busquedaProyectoNuevo").value = "";
}

// LIMPIAR SELECCIÓN
window.limpiarSeleccionProyecto = () => {
proyectoSeleccionadoNuevo = null;
document.getElementById("proyectoSeleccionadoDisplay").style.display = "none";
document.getElementById("busquedaProyectoNuevo").style.display = "block";
document.getElementById("busquedaProyectoNuevo").value = "";
actualizarDropdownProyectos();
};

// MANEJAR CLICK EN BUSCADOR
document.getElementById("busquedaProyectoNuevo").addEventListener("focus", () => {
document.getElementById("dropdownProyectos").style.display = "block";
actualizarDropdownProyectos();
});

document.getElementById("busquedaProyectoNuevo").addEventListener("input", () => {
document.getElementById("dropdownProyectos").style.display = "block";
filtrarDropdownProyectos();
});

// CERRAR DROPDOWN AL HACER CLICK FUERA
document.addEventListener("click", (e) => {
const container = document.querySelector(".proyecto-selector-container");
if(container && !container.contains(e.target)) {
    document.getElementById("dropdownProyectos").style.display = "none";
}
});

// BUSCADOR PRINCIPAL
document.getElementById("busquedaProyecto").addEventListener("input",(e)=>{
const val=e.target.value.toLowerCase();
const filtrados = proyectos.filter(p=>p.nombre.toLowerCase().includes(val));
renderProyectos(filtrados);
});

// GUARDAR REGISTRO
window.guardarRegistro = async ()=>{
if(!proyectoSeleccionadoNuevo) {
    alert("Selecciona un proyecto");
    return;
}

const observacion = document.getElementById("observacion").value;
const tarea = document.getElementById("tarea").value;
const dolores = document.getElementById("dolores").value;
const fechaCompromiso = document.getElementById("fechaCompromiso").value;
const urgencia = document.getElementById("urgencia").value;
const importancia = document.getElementById("importancia").value;
const anexos = document.getElementById("anexos").value;

if(!observacion && !tarea && !dolores) {
    alert("Completa al menos un campo (Observación, Tarea o Dolores)");
    return;
}

await addDoc(collection(db,"bitacora"),{
proyectoId: proyectoSeleccionadoNuevo.id,
observacion: observacion,
tarea: tarea,
dolores: dolores,
fechaCompromiso: fechaCompromiso || null,
urgencia: urgencia,
importancia: importancia,
anexos: anexos,
completado: false,
fecha: serverTimestamp()
});

// Limpiar campos
document.getElementById("observacion").value = "";
document.getElementById("tarea").value = "";
document.getElementById("dolores").value = "";
document.getElementById("fechaCompromiso").value = "";
document.getElementById("urgencia").value = "";
document.getElementById("importancia").value = "";
document.getElementById("anexos").value = "";

// Mantener el mismo proyecto seleccionado
cargarRegistrosMultiples();
alert("Registro guardado exitosamente");
};

// CHECK
window.toggleCheck = async(id, estado)=>{
await updateDoc(doc(db,"bitacora",id),{
completado: !estado
});
cargarRegistrosMultiples();
};

// CARGAR REGISTROS DE MÚLTIPLES PROYECTOS
async function cargarRegistrosMultiples(){
const lista = document.getElementById("lista");
lista.innerHTML="Cargando...";

if(proyectosSeleccionados.size === 0){
    lista.innerHTML="<div class='empty-state'>No hay proyectos seleccionados</div>";
    registrosDeProyectos = [];
    return;
}

const proyectoIds = Array.from(proyectosSeleccionados.keys());
const todasPromesas = proyectoIds.map(async (proyectoId) => {
    const q = query(collection(db,"bitacora"), where("proyectoId","==",proyectoId));
    const snap = await getDocs(q);
    const registros = [];
    snap.forEach(d => registros.push({id:d.id, ...d.data(), proyectoId: proyectoId}));
    return registros;
});

const resultados = await Promise.all(todasPromesas);
registrosDeProyectos = resultados.flat();

aplicarFiltrosMultiples();
}

// FILTROS
function aplicarFiltrosMultiples(){
let docs = [...registrosDeProyectos];

const filtroCheck = document.getElementById("filtroCompletados").checked;
const filtroTexto = document.getElementById("filtroTarea").value.toLowerCase();

if(filtroCheck){
    docs = docs.filter(d=>d.completado===true);
}

if(filtroTexto){
    docs = docs.filter(d=>(d.tarea || "").toLowerCase().includes(filtroTexto));
}

// ORDEN
docs.sort((a,b)=>{
    const pA = getPrioridad(a);
    const pB = getPrioridad(b);
    if(pA !== pB) return pA - pB;
    
    if(!a.fechaCompromiso) return 1;
    if(!b.fechaCompromiso) return -1;
    
    return new Date(a.fechaCompromiso) - new Date(b.fechaCompromiso);
});

renderRegistrosMultiples(docs);
}

// RENDER REGISTROS
function renderRegistrosMultiples(docs){
const lista = document.getElementById("lista");

if(docs.length === 0){
    lista.innerHTML="<div class='empty-state'>No hay registros para mostrar</div>";
    return;
}

lista.innerHTML="";

docs.forEach(d => {
    const proyecto = proyectos.find(p => p.id === d.proyectoId);
    const nombreProyecto = proyecto ? proyecto.nombre : "Proyecto no encontrado";
    
    const div = document.createElement("div");
    div.className = "registro";
    if(d.completado) div.classList.add("completado");
    
    const prioridad = getPrioridad(d);
    
    div.innerHTML = `
        <button class="check-btn ${d.completado ? "activo" : ""}"
            onclick="toggleCheck('${d.id}',${d.completado})">✔</button>
        
        <div class="proyecto-tag">📁 ${nombreProyecto}</div>
        <div class="prioridad">Prioridad ${prioridad}</div>
        
        <b>Compromiso:</b> ${d.fechaCompromiso || "Sin fecha"}<br>
        <b>Urgencia:</b> ${d.urgencia || "-"}<br>
        <b>Importancia:</b> ${d.importancia || "-"}<br>
        
        ${d.observacion ? "<b>Obs:</b> "+d.observacion+"<br>" : ""}
        ${d.tarea ? "<b>Tarea:</b> "+d.tarea+"<br>" : ""}
        ${d.dolores ? "<b>Dolores:</b> "+d.dolores+"<br>" : ""}
        ${d.anexos ? `<a href="${d.anexos}" target="_blank">🔗 Ver anexos</a>` : ""}
    `;
    
    lista.appendChild(div);
});
}

// EXPORTAR A EXCEL
window.exportarExcel = () => {
if(proyectosSeleccionados.size === 0){
    alert("Por favor, selecciona al menos un proyecto");
    return;
}

if(registrosDeProyectos.length === 0){
    alert("No hay registros para exportar en los proyectos seleccionados");
    return;
}

// Aplicar filtros actuales
let docsParaExportar = [...registrosDeProyectos];

const filtroCheck = document.getElementById("filtroCompletados").checked;
const filtroTexto = document.getElementById("filtroTarea").value.toLowerCase();

if(filtroCheck){
    docsParaExportar = docsParaExportar.filter(d => d.completado === true);
}

if(filtroTexto){
    docsParaExportar = docsParaExportar.filter(d => (d.tarea || "").toLowerCase().includes(filtroTexto));
}

// Ordenar
docsParaExportar.sort((a,b)=>{
    const pA = getPrioridad(a);
    const pB = getPrioridad(b);
    if(pA !== pB) return pA - pB;
    
    if(!a.fechaCompromiso) return 1;
    if(!b.fechaCompromiso) return -1;
    
    return new Date(a.fechaCompromiso) - new Date(b.fechaCompromiso);
});

// Preparar datos
const excelData = docsParaExportar.map(registro => {
    const proyecto = proyectos.find(p => p.id === registro.proyectoId);
    return {
        'Proyecto': proyecto ? proyecto.nombre : "Desconocido",
        'Prioridad': getPrioridad(registro),
        'Fecha Compromiso': registro.fechaCompromiso || 'Sin fecha',
        'Urgencia': registro.urgencia || '-',
        'Importancia': registro.importancia || '-',
        'Observación': registro.observacion || '',
        'Tarea': registro.tarea || '',
        'Dolores': registro.dolores || '',
        'Anexos': registro.anexos || '',
        'Completado': registro.completado ? 'Sí' : 'No'
    };
});

const ws = XLSX.utils.json_to_sheet(excelData);
const colWidths = [
    {wch:20}, {wch:10}, {wch:15}, {wch:10}, 
    {wch:10}, {wch:40}, {wch:40}, {wch:40}, 
    {wch:30}, {wch:12}
];
ws['!cols'] = colWidths;

const wb = XLSX.utils.book_new();
const fecha = new Date().toISOString().slice(0,19).replace(/:/g, '-');
const nombreArchivo = `bitacora_multiple_${fecha}.xlsx`;
XLSX.utils.book_append_sheet(wb, ws, 'Registros');
XLSX.writeFile(wb, nombreArchivo);

alert(`Exportados ${excelData.length} registros`);
};
