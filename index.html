<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bitácora v2.0</title>

<style>
body {
    font-family: "Segoe UI", Arial;
    background: #f5f7fa;
    margin: 0;
}

.header {
    background: white;
    padding: 15px 30px;
    border-bottom: 1px solid #e5e7eb;
}

.container {
    max-width: 900px;
    margin: 30px auto;
}

.card {
    background: white;
    padding: 20px;
    margin-bottom: 20px;
    border: 1px solid #e5e7eb;
    border-radius: 8px;
}

input, textarea, select {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    border: 1px solid #d1d5db;
    border-radius: 6px;
}

button {
    margin-top: 10px;
    padding: 10px;
    background: #065f46;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

.btn-clear {
    background: #6b7280;
}

.lista-proyectos {
    max-height: 150px;
    overflow-y: auto;
    border: 1px solid #d1d5db;
    border-radius: 6px;
    margin-top: 8px;
}

.item-proyecto {
    padding: 8px;
    cursor: pointer;
}

.item-proyecto:hover {
    background: #e5e7eb;
}

.item-proyecto.activo {
    background: #d1fae5;
}

.registro {
    padding: 12px;
    border-bottom: 1px solid #e5e7eb;
    position: relative;
}

.completado {
    background: #dcfce7;
    border-left: 4px solid #16a34a;
}

.check-btn {
    position: absolute;
    right: 10px;
    top: 10px;
    width: 28px;
    height: 28px;
}
</style>
</head>

<body>

<div class="header">
<h2>Bitácora v2.0</h2>
</div>

<div class="container">

<div class="card">
<h3>Seleccionar Proyecto</h3>

<input id="busquedaProyecto" placeholder="Buscar proyecto...">
<div id="listaProyectos" class="lista-proyectos"></div>

<button onclick="limpiarSeleccion()" class="btn-clear">
Deseleccionar proyecto
</button>

</div>

<div class="card">
<h3>Registros</h3>
<div id="lista"></div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import {
getFirestore, collection, getDocs,
query, where
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const app = initializeApp({
apiKey: "AIzaSy...",
projectId: "bitacora-8f4ce"
});

const db = getFirestore(app);

let proyectos = [];
let proyectoSeleccionado = null;

// CARGAR PROYECTOS
async function cargarProyectos(){
const snap = await getDocs(collection(db,"proyectos"));
proyectos=[];
snap.forEach(d=>proyectos.push({id:d.id,...d.data()}));
renderProyectos(proyectos);
}

// RENDER
function renderProyectos(lista){
const cont = document.getElementById("listaProyectos");
cont.innerHTML="";

lista.forEach(p=>{
const div=document.createElement("div");
div.className="item-proyecto";

// 🔴 marcar activo
if(proyectoSeleccionado && proyectoSeleccionado.id === p.id){
div.classList.add("activo");
}

div.textContent=p.nombre;

// 🔴 TOGGLE SELECCIÓN
div.onclick=()=>{

// si ya está seleccionado → deselecciona
if(proyectoSeleccionado && proyectoSeleccionado.id === p.id){
limpiarSeleccion();
return;
}

// seleccionar nuevo
proyectoSeleccionado = p;
busquedaProyecto.value = p.nombre;

renderProyectos(proyectos);
cargarRegistros();
};

cont.appendChild(div);
});
}

// 🔴 LIMPIAR SELECCIÓN
window.limpiarSeleccion = ()=>{
proyectoSeleccionado = null;
busquedaProyecto.value = "";
document.getElementById("lista").innerHTML = "No hay registros";
renderProyectos(proyectos);
};

// BUSCADOR
busquedaProyecto.addEventListener("input",(e)=>{
const val=e.target.value.toLowerCase();
renderProyectos(proyectos.filter(p=>p.nombre.toLowerCase().includes(val)));
});

// CARGAR REGISTROS
async function cargarRegistros(){

const lista = document.getElementById("lista");

if(!proyectoSeleccionado){
lista.innerHTML="No hay registros";
return;
}

const q=query(
collection(db,"bitacora"),
where("proyectoId","==",proyectoSeleccionado.id)
);

const snap=await getDocs(q);

let docs=[];
snap.forEach(d=>docs.push(d.data()));

if(docs.length===0){
lista.innerHTML="No hay registros";
return;
}

lista.innerHTML="";

docs.forEach(d=>{
const div=document.createElement("div");
div.className="registro";
if(d.completado) div.classList.add("completado");

div.innerHTML=`
<b>${d.fechaCompromiso || "Sin fecha"}</b><br>
${d.tarea || ""}
`;

lista.appendChild(div);
});
}

cargarProyectos();

</script>

</body>
</html>
