<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bitácora</title>

<style>
body {
    margin: 0;
    padding: 20px;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
}

.container {
    max-width: 700px;
    margin: auto;
}

h1 {
    text-align: center;
}

input, textarea, button {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    border-radius: 5px;
    border: none;
}

textarea {
    resize: vertical;
}

button {
    background: #22c55e;
    cursor: pointer;
}

.registro {
    background: rgba(255,255,255,0.05);
    margin-top: 12px;
    padding: 12px;
    border-radius: 6px;
}

.fecha {
    font-size: 12px;
    color: #94a3b8;
}
</style>
</head>

<body>

<div class="container">
    <h1>Bitácora</h1>

    <input id="grupo" placeholder="Grupo de proyecto (obligatorio)">
    <textarea id="observacion" placeholder="Observación (opcional)"></textarea>
    <textarea id="tarea" placeholder="Tarea (opcional)"></textarea>
    <textarea id="dolores" placeholder="Ampliación de dolores (opcional)"></textarea>
    <input id="anexos" placeholder="Link de anexos (opcional)">

    <button onclick="guardar()">Guardar registro</button>

    <div id="lista"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { 
    getFirestore, 
    collection, 
    addDoc, 
    getDocs, 
    query, 
    orderBy,
    serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

// Configuración Firebase
const firebaseConfig = {
    apiKey: "AIzaSyCjg6LzOOByPvHGc4aTIl8vtFq7pCzoYSA",
    authDomain: "bitacora-8f4ce.firebaseapp.com",
    projectId: "bitacora-8f4ce",
    storageBucket: "bitacora-8f4ce.firebasestorage.app",
    messagingSenderId: "270773053654",
    appId: "1:270773053654:web:953528165c86f79e638177"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Guardar registro
window.guardar = async function () {

    const grupo = document.getElementById("grupo").value.trim();
    const observacion = document.getElementById("observacion").value.trim();
    const tarea = document.getElementById("tarea").value.trim();
    const dolores = document.getElementById("dolores").value.trim();
    const anexos = document.getElementById("anexos").value.trim();

    // Validación mínima
    if (!grupo) {
        alert("El campo 'Grupo de proyecto' es obligatorio");
        return;
    }

    await addDoc(collection(db, "bitacora"), {
        grupo,
        observacion: observacion || null,
        tarea: tarea || null,
        dolores: dolores || null,
        anexos: anexos || null,
        fecha: serverTimestamp()
    });

    limpiar();
    cargar();
};

// Limpiar formulario
function limpiar() {
    document.getElementById("grupo").value = "";
    document.getElementById("observacion").value = "";
    document.getElementById("tarea").value = "";
    document.getElementById("dolores").value = "";
    document.getElementById("anexos").value = "";
}

// Cargar registros
async function cargar() {
    const lista = document.getElementById("lista");
    lista.innerHTML = "";

    const q = query(collection(db, "bitacora"), orderBy("fecha", "desc"));
    const snapshot = await getDocs(q);

    snapshot.forEach(doc => {
        const d = doc.data();

        const fecha = d.fecha?.seconds
            ? new Date(d.fecha.seconds * 1000).toLocaleString()
            : "Sin fecha";

        const div = document.createElement("div");
        div.className = "registro";

        div.innerHTML = `
            <div class="fecha">${fecha}</div>
            <strong>Grupo:</strong> ${d.grupo}<br>
            ${d.observacion ? `<strong>Observación:</strong> ${d.observacion}<br>` : ""}
            ${d.tarea ? `<strong>Tarea:</strong> ${d.tarea}<br>` : ""}
            ${d.dolores ? `<strong>Dolores:</strong> ${d.dolores}<br>` : ""}
            ${d.anexos ? `<strong>Anexos:</strong> <a href="${d.anexos}" target="_blank">Ver</a>` : ""}
        `;

        lista.appendChild(div);
    });
}

// Inicializar
cargar();

</script>

</body>
</html>
