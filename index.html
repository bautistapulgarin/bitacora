<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bitácora v2.0</title>

<style>
body {
    font-family: "Segoe UI", Arial, sans-serif;
    background: #f5f7fa;
    color: #1f2937;
    margin: 0;
}

/* HEADER */
.header {
    background: white;
    padding: 15px 30px;
    border-bottom: 1px solid #e5e7eb;
}

.header h1 {
    margin: 0;
    font-size: 20px;
}

.version {
    font-size: 12px;
    color: #6b7280;
}

/* CONTENEDOR */
.container {
    max-width: 900px;
    margin: 30px auto;
    padding: 0 20px;
}

/* TARJETAS */
.card {
    background: white;
    padding: 20px;
    margin-bottom: 20px;
    border-radius: 8px;
    border: 1px solid #e5e7eb;
}

/* INPUTS */
input, textarea, select {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    border: 1px solid #d1d5db;
    border-radius: 6px;
    font-size: 14px;
}

textarea {
    resize: vertical;
}

/* BOTONES */
button {
    margin-top: 10px;
    padding: 10px;
    background: #065f46;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
}

button.secondary {
    background: #e5e7eb;
    color: #111827;
}

/* REGISTROS */
.registro {
    border-bottom: 1px solid #e5e7eb;
    padding: 10px 0;
}

.fecha {
    font-size: 12px;
    color: #6b7280;
}

/* TITULOS */
h3 {
    margin-top: 0;
    font-size: 16px;
}
</style>
</head>

<body>

<div class="header">
    <h1>Bitácora</h1>
    <div id="versionInfo" class="version"></div>
</div>

<div class="container">

<!-- CREAR PROYECTO -->
<div class="card">
    <h3>Crear Proyecto</h3>
    <input id="nuevoProyecto" placeholder="Nombre del proyecto">
    <button onclick="crearProyecto()">Crear proyecto</button>
</div>

<!-- SELECCIONAR -->
<div class="card">
    <h3>Proyecto</h3>
    <select id="proyectoSelect"></select>
    <button class="secondary" onclick="exportarExcel()">Descargar Excel</button>
</div>

<!-- REGISTRO -->
<div class="card">
    <h3>Nuevo Registro</h3>

    <textarea id="observacion" placeholder="Observación"></textarea>
    <textarea id="tarea" placeholder="Tarea"></textarea>
    <textarea id="dolores" placeholder="Ampliación de dolores"></textarea>
    <input id="anexos" placeholder="Link de anexos">

    <button onclick="guardarRegistro()">Guardar registro</button>
</div>

<!-- LISTADO -->
<div class="card">
    <h3>Registros</h3>
    <div id="lista"></div>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import {
    getFirestore,
    collection,
    addDoc,
    getDocs,
    query,
    where,
    serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSy...",
    authDomain: "bitacora-8f4ce.firebaseapp.com",
    projectId: "bitacora-8f4ce",
    storageBucket: "bitacora-8f4ce.firebasestorage.app",
    messagingSenderId: "270773053654",
    appId: "1:270773053654:web:953528165c86f79e638177"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// VERSION
document.getElementById("versionInfo").innerText =
    "Versión 2.0 | " + new Date().toLocaleString();

// CREAR PROYECTO
window.crearProyecto = async () => {
    const nombre = document.getElementById("nuevoProyecto").value.trim();
    if (!nombre) return;

    await addDoc(collection(db, "proyectos"), {
        nombre,
        fechaCreacion: serverTimestamp()
    });

    document.getElementById("nuevoProyecto").value = "";
    cargarProyectos();
};

// CARGAR PROYECTOS
async function cargarProyectos() {
    const select = document.getElementById("proyectoSelect");
    select.innerHTML = "";

    const snapshot = await getDocs(collection(db, "proyectos"));

    snapshot.forEach(doc => {
        const option = document.createElement("option");
        option.value = doc.id;
        option.textContent = doc.data().nombre;
        select.appendChild(option);
    });

    cargarRegistros();
}

// GUARDAR REGISTRO
window.guardarRegistro = async () => {

    const proyectoId = document.getElementById("proyectoSelect").value;

    if (!proyectoId) {
        alert("Selecciona un proyecto");
        return;
    }

    await addDoc(collection(db, "bitacora"), {
        proyectoId,
        observacion: document.getElementById("observacion").value || null,
        tarea: document.getElementById("tarea").value || null,
        dolores: document.getElementById("dolores").value || null,
        anexos: document.getElementById("anexos").value || null,
        fecha: serverTimestamp()
    });

    limpiar();
    cargarRegistros();
};

function limpiar() {
    document.getElementById("observacion").value = "";
    document.getElementById("tarea").value = "";
    document.getElementById("dolores").value = "";
    document.getElementById("anexos").value = "";
}

// CARGAR REGISTROS
async function cargarRegistros() {

    const lista = document.getElementById("lista");
    lista.innerHTML = "Cargando...";

    const proyectoId = document.getElementById("proyectoSelect").value;
    if (!proyectoId) return;

    const q = query(
        collection(db, "bitacora"),
        where("proyectoId", "==", proyectoId)
    );

    const snapshot = await getDocs(q);

    let docs = [];
    snapshot.forEach(doc => docs.push(doc.data()));

    docs.sort((a, b) => (b.fecha?.seconds || 0) - (a.fecha?.seconds || 0));

    lista.innerHTML = "";

    if (docs.length === 0) {
        lista.innerHTML = "No hay registros";
        return;
    }

    docs.forEach(d => {
        const fecha = d.fecha?.seconds
            ? new Date(d.fecha.seconds * 1000).toLocaleString()
            : "";

        const div = document.createElement("div");
        div.className = "registro";

        div.innerHTML = `
            <div class="fecha">${fecha}</div>
            ${d.observacion || ""}
        `;

        lista.appendChild(div);
    });
}

// EXPORTAR EXCEL
window.exportarExcel = async () => {

    const proyectoId = document.getElementById("proyectoSelect").value;
    if (!proyectoId) return;

    const q = query(
        collection(db, "bitacora"),
        where("proyectoId", "==", proyectoId)
    );

    const snapshot = await getDocs(q);

    let datos = [];

    snapshot.forEach(doc => {
        const d = doc.data();

        datos.push({
            Fecha: d.fecha?.seconds
                ? new Date(d.fecha.seconds * 1000).toLocaleString()
                : "",
            Observación: d.observacion || "",
            Tarea: d.tarea || "",
            Dolores: d.dolores || "",
            Anexos: d.anexos || ""
        });
    });

    const ws = XLSX.utils.json_to_sheet(datos);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Bitacora");

    XLSX.writeFile(wb, "bitacora_v2.xlsx");
};

// EVENTO
document.getElementById("proyectoSelect")
    .addEventListener("change", cargarRegistros);

// INIT
cargarProyectos();

</script>

</body>
</html>
