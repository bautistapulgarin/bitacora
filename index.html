<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bitácora v2.0</title>

<style>
body {
    font-family: "Segoe UI", Arial;
    background: #f5f7fa;
    margin: 0;
}

.header {
    background: white;
    padding: 15px 30px;
    border-bottom: 1px solid #e5e7eb;
}

.container {
    max-width: 900px;
    margin: 30px auto;
}

.card {
    background: white;
    padding: 20px;
    margin-bottom: 20px;
    border: 1px solid #e5e7eb;
    border-radius: 8px;
}

input, textarea, select {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    border: 1px solid #d1d5db;
    border-radius: 6px;
}

button {
    margin-top: 10px;
    padding: 10px;
    background: #065f46;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

.lista-proyectos {
    max-height: 150px;
    overflow-y: auto;
    border: 1px solid #d1d5db;
    border-radius: 6px;
    margin-top: 8px;
}

.item-proyecto {
    padding: 8px;
    cursor: pointer;
}

.item-proyecto.activo {
    background: #dcfce7;
    font-weight: bold;
}

.registro {
    padding: 12px;
    border-bottom: 1px solid #e5e7eb;
    position: relative;
}

.completado {
    background: #dcfce7;
    border-left: 4px solid #16a34a;
}

.check-btn {
    position: absolute;
    right: 10px;
    top: 10px;
    width: 28px;
    height: 28px;
}

a.link {
    color: #065f46;
    text-decoration: underline;
    font-size: 13px;
}
</style>
</head>

<body>

<div class="header">
<h2>Bitácora v2.0</h2>
</div>

<div class="container">

<div class="card">
<h3>Seleccionar Proyecto(s)</h3>
<input id="busquedaProyecto" placeholder="Buscar proyecto...">
<div id="listaProyectos" class="lista-proyectos"></div>

<button onclick="limpiarSeleccion()">Deseleccionar todos</button>
<button onclick="exportarExcel()">Descargar Excel</button>
</div>

<div class="card">
<h3>Registros</h3>
<div id="lista"></div>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import {
getFirestore, collection, getDocs,
query, where
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const app = initializeApp({
apiKey: "AIzaSy...",
projectId: "bitacora-8f4ce"
});

const db = getFirestore(app);

let proyectos = [];
let proyectosSeleccionados = [];
let registrosActuales = [];

// PRIORIDAD
function getPrioridad(d){
if(d.importancia==="Alta" && d.urgencia==="Alta") return 1;
if(d.importancia==="Alta" && d.urgencia==="Media") return 2;
if(d.importancia==="Alta" && d.urgencia==="Baja") return 3;
if(d.importancia==="Media" && d.urgencia==="Alta") return 4;
if(d.importancia==="Media" && d.urgencia==="Media") return 5;
if(d.importancia==="Baja") return 6;
return 7;
}

// CARGAR PROYECTOS
async function cargarProyectos(){
const snap = await getDocs(collection(db,"proyectos"));
proyectos=[];
snap.forEach(d=>proyectos.push({id:d.id,...d.data()}));
renderProyectos(proyectos);
}

// RENDER PROYECTOS
function renderProyectos(lista){
const cont=document.getElementById("listaProyectos");
cont.innerHTML="";

lista.forEach(p=>{
const div=document.createElement("div");
div.className="item-proyecto";

if(proyectosSeleccionados.find(x=>x.id===p.id)){
div.classList.add("activo");
}

div.textContent=p.nombre;

div.onclick=()=>{
const existe = proyectosSeleccionados.find(x=>x.id===p.id);

if(existe){
proyectosSeleccionados = proyectosSeleccionados.filter(x=>x.id!==p.id);
}else{
proyectosSeleccionados.push(p);
}

renderProyectos(proyectos);
cargarRegistros();
};

cont.appendChild(div);
});
}

// LIMPIAR
window.limpiarSeleccion = ()=>{
proyectosSeleccionados = [];
document.getElementById("lista").innerHTML="No hay registros";
renderProyectos(proyectos);
};

// CARGAR REGISTROS
async function cargarRegistros(){

if(proyectosSeleccionados.length===0){
registrosActuales=[];
render([]);
return;
}

let docs=[];

for(const p of proyectosSeleccionados){
const q=query(collection(db,"bitacora"),
where("proyectoId","==",p.id));

const snap=await getDocs(q);
snap.forEach(d=>docs.push({id:d.id,...d.data(), proyecto:p.nombre}));
}

registrosActuales=docs;
render(docs);
}

// 🔴 RENDER CORREGIDO (OBS + ANEXOS)
function render(docs){

const lista=document.getElementById("lista");

if(docs.length===0){
lista.innerHTML="No hay registros";
return;
}

lista.innerHTML="";

docs.forEach(d=>{
const div=document.createElement("div");
div.className="registro";
if(d.completado) div.classList.add("completado");

div.innerHTML=`
<b>${d.proyecto}</b><br>

${d.observacion ? "<b>Obs:</b> " + d.observacion + "<br>" : ""}
${d.tarea ? "<b>Tarea:</b> " + d.tarea + "<br>" : ""}
${d.fechaCompromiso ? "<b>Compromiso:</b> " + d.fechaCompromiso + "<br>" : ""}
${d.urgencia ? "<b>Urgencia:</b> " + d.urgencia + "<br>" : ""}
${d.importancia ? "<b>Importancia:</b> " + d.importancia + "<br>" : ""}

${d.anexos ? `<a class="link" href="${d.anexos}" target="_blank">Ver anexos</a>` : ""}
`;

lista.appendChild(div);
});
}

// EXPORTAR EXCEL
window.exportarExcel = ()=>{

if(registrosActuales.length===0){
alert("No hay datos");
return;
}

let datos = registrosActuales.map(d=>({
Proyecto: d.proyecto,
Observacion: d.observacion || "",
Tarea: d.tarea || "",
"Fecha Compromiso": d.fechaCompromiso || "",
Urgencia: d.urgencia || "",
Importancia: d.importancia || "",
Anexos: d.anexos || "",
Estado: d.completado ? "Completado" : "Pendiente"
}));

const ws = XLSX.utils.json_to_sheet(datos);
const wb = XLSX.utils.book_new();
XLSX.utils.book_append_sheet(wb, ws, "Bitacora");

XLSX.writeFile(wb, "bitacora.xlsx");
};

cargarProyectos();

</script>

</body>
</html>
