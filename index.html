<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bitácora</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: #e2e8f0;
    padding: 20px;
}

.container {
    max-width: 800px;
    margin: auto;
}

input, textarea, select, button {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    border-radius: 5px;
    border: none;
}

button {
    background: #22c55e;
    cursor: pointer;
}

.registro {
    margin-top: 10px;
    padding: 10px;
    background: rgba(255,255,255,0.05);
    border-radius: 6px;
}

.fecha {
    font-size: 12px;
    color: #94a3b8;
}
</style>
</head>

<body>

<div class="container">

<h1>Bitácora</h1>

<!-- CREAR PROYECTO -->
<h3>Crear Proyecto</h3>
<input id="nuevoProyecto" placeholder="Nombre del proyecto">
<button onclick="crearProyecto()">Crear proyecto</button>

<hr>

<!-- SELECCIONAR PROYECTO -->
<h3>Seleccionar Proyecto</h3>
<select id="proyectoSelect"></select>

<hr>

<!-- FORMULARIO BITÁCORA -->
<h3>Nuevo Registro</h3>

<textarea id="observacion" placeholder="Observación (opcional)"></textarea>
<textarea id="tarea" placeholder="Tarea (opcional)"></textarea>
<textarea id="dolores" placeholder="Ampliación de dolores (opcional)"></textarea>
<input id="anexos" placeholder="Link anexos (opcional)">

<button onclick="guardarRegistro()">Guardar registro</button>

<hr>

<div id="lista"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import {
    getFirestore,
    collection,
    addDoc,
    getDocs,
    query,
    where,
    orderBy,
    serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyCjg6LzOOByPvHGc4aTIl8vtFq7pCzoYSA",
    authDomain: "bitacora-8f4ce.firebaseapp.com",
    projectId: "bitacora-8f4ce",
    storageBucket: "bitacora-8f4ce.firebasestorage.app",
    messagingSenderId: "270773053654",
    appId: "1:270773053654:web:953528165c86f79e638177"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// =======================
// CREAR PROYECTO
// =======================
window.crearProyecto = async function () {
    const nombre = document.getElementById("nuevoProyecto").value.trim();

    if (!nombre) return;

    await addDoc(collection(db, "proyectos"), {
        nombre,
        fechaCreacion: serverTimestamp()
    });

    document.getElementById("nuevoProyecto").value = "";
    cargarProyectos();
};

// =======================
// CARGAR PROYECTOS
// =======================
async function cargarProyectos() {
    const select = document.getElementById("proyectoSelect");
    select.innerHTML = "";

    const snapshot = await getDocs(collection(db, "proyectos"));

    snapshot.forEach(doc => {
        const option = document.createElement("option");
        option.value = doc.id;
        option.textContent = doc.data().nombre;
        select.appendChild(option);
    });

    cargarRegistros();
}

// =======================
// GUARDAR REGISTRO
// =======================
window.guardarRegistro = async function () {

    const proyectoId = document.getElementById("proyectoSelect").value;
    const observacion = document.getElementById("observacion").value.trim();
    const tarea = document.getElementById("tarea").value.trim();
    const dolores = document.getElementById("dolores").value.trim();
    const anexos = document.getElementById("anexos").value.trim();

    if (!proyectoId) {
        alert("Debes seleccionar un proyecto");
        return;
    }

    await addDoc(collection(db, "bitacora"), {
        proyectoId,
        observacion: observacion || null,
        tarea: tarea || null,
        dolores: dolores || null,
        anexos: anexos || null,
        fecha: serverTimestamp()
    });

    limpiar();
    cargarRegistros();
};

// =======================
// LIMPIAR FORMULARIO
// =======================
function limpiar() {
    document.getElementById("observacion").value = "";
    document.getElementById("tarea").value = "";
    document.getElementById("dolores").value = "";
    document.getElementById("anexos").value = "";
}

// =======================
// CARGAR REGISTROS
// =======================
async function cargarRegistros() {

    const lista = document.getElementById("lista");
    lista.innerHTML = "";

    const proyectoId = document.getElementById("proyectoSelect").value;

    if (!proyectoId) return;

    const q = query(
        collection(db, "bitacora"),
        where("proyectoId", "==", proyectoId),
        orderBy("fecha", "desc")
    );

    const snapshot = await getDocs(q);

    snapshot.forEach(doc => {
        const d = doc.data();

        const fecha = d.fecha?.seconds
            ? new Date(d.fecha.seconds * 1000).toLocaleString()
            : "Sin fecha";

        const div = document.createElement("div");
        div.className = "registro";

        div.innerHTML = `
            <div class="fecha">${fecha}</div>
            ${d.observacion ? `<strong>Observación:</strong> ${d.observacion}<br>` : ""}
            ${d.tarea ? `<strong>Tarea:</strong> ${d.tarea}<br>` : ""}
            ${d.dolores ? `<strong>Dolores:</strong> ${d.dolores}<br>` : ""}
            ${d.anexos ? `<strong>Anexos:</strong> <a href="${d.anexos}" target="_blank">Ver</a>` : ""}
        `;

        lista.appendChild(div);
    });
}

// =======================
// EVENTO CAMBIO PROYECTO
// =======================
document.getElementById("proyectoSelect")
    .addEventListener("change", cargarRegistros);

// INIT
cargarProyectos();

</script>

</body>
</html>
