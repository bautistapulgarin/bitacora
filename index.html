<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bitácora</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: #e2e8f0;
    padding: 20px;
}

.container {
    max-width: 800px;
    margin: auto;
}

input, textarea, select, button {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    border-radius: 5px;
    border: none;
}

button {
    background: #22c55e;
    cursor: pointer;
}

.registro {
    margin-top: 10px;
    padding: 10px;
    background: rgba(255,255,255,0.05);
    border-radius: 6px;
}

.fecha {
    font-size: 12px;
    color: #94a3b8;
}
</style>
</head>

<body>

<div class="container">

<h1>Bitácora</h1>

<h3>Crear Proyecto</h3>
<input id="nuevoProyecto" placeholder="Nombre del proyecto">
<button onclick="crearProyecto()">Crear proyecto</button>

<hr>

<h3>Seleccionar Proyecto</h3>
<select id="proyectoSelect"></select>

<button onclick="exportarExcel()">Descargar Excel</button>

<hr>

<h3>Nuevo Registro</h3>

<textarea id="observacion" placeholder="Observación"></textarea>
<textarea id="tarea" placeholder="Tarea"></textarea>
<textarea id="dolores" placeholder="Ampliación de dolores"></textarea>
<input id="anexos" placeholder="Link anexos">

<button onclick="guardarRegistro()">Guardar registro</button>

<hr>

<div id="lista"></div>

</div>

<!-- SheetJS -->
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import {
    getFirestore,
    collection,
    addDoc,
    getDocs,
    query,
    where,
    orderBy,
    serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSy...",
    authDomain: "bitacora-8f4ce.firebaseapp.com",
    projectId: "bitacora-8f4ce",
    storageBucket: "bitacora-8f4ce.firebasestorage.app",
    messagingSenderId: "270773053654",
    appId: "1:270773053654:web:953528165c86f79e638177"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// =======================
// CREAR PROYECTO
// =======================
window.crearProyecto = async function () {
    const nombre = document.getElementById("nuevoProyecto").value.trim();
    if (!nombre) return;

    await addDoc(collection(db, "proyectos"), {
        nombre,
        fechaCreacion: serverTimestamp()
    });

    document.getElementById("nuevoProyecto").value = "";
    cargarProyectos();
};

// =======================
// CARGAR PROYECTOS
// =======================
async function cargarProyectos() {
    const select = document.getElementById("proyectoSelect");
    select.innerHTML = "";

    const snapshot = await getDocs(collection(db, "proyectos"));

    snapshot.forEach(doc => {
        const option = document.createElement("option");
        option.value = doc.id;
        option.textContent = doc.data().nombre;
        select.appendChild(option);
    });

    cargarRegistros();
}

// =======================
// GUARDAR REGISTRO
// =======================
window.guardarRegistro = async function () {

    const proyectoId = document.getElementById("proyectoSelect").value;
    const observacion = document.getElementById("observacion").value.trim();
    const tarea = document.getElementById("tarea").value.trim();
    const dolores = document.getElementById("dolores").value.trim();
    const anexos = document.getElementById("anexos").value.trim();

    if (!proyectoId) {
        alert("Selecciona un proyecto");
        return;
    }

    await addDoc(collection(db, "bitacora"), {
        proyectoId,
        observacion: observacion || null,
        tarea: tarea || null,
        dolores: dolores || null,
        anexos: anexos || null,
        fecha: serverTimestamp()
    });

    limpiar();
    cargarRegistros();
};

function limpiar() {
    document.getElementById("observacion").value = "";
    document.getElementById("tarea").value = "";
    document.getElementById("dolores").value = "";
    document.getElementById("anexos").value = "";
}

// =======================
// CARGAR REGISTROS
// =======================
async function cargarRegistros() {

    const lista = document.getElementById("lista");
    lista.innerHTML = "";

    const proyectoId = document.getElementById("proyectoSelect").value;
    if (!proyectoId) return;

    const q = query(
        collection(db, "bitacora"),
        where("proyectoId", "==", proyectoId),
        orderBy("fecha", "desc")
    );

    const snapshot = await getDocs(q);

    snapshot.forEach(doc => {
        const d = doc.data();

        const fecha = d.fecha?.seconds
            ? new Date(d.fecha.seconds * 1000).toLocaleString()
            : "";

        const div = document.createElement("div");
        div.className = "registro";

        div.innerHTML = `
            <div class="fecha">${fecha}</div>
            ${d.observacion || ""}
        `;

        lista.appendChild(div);
    });
}

// =======================
// EXPORTAR A EXCEL
// =======================
window.exportarExcel = async function () {

    const proyectoId = document.getElementById("proyectoSelect").value;
    if (!proyectoId) {
        alert("Selecciona un proyecto");
        return;
    }

    const q = query(
        collection(db, "bitacora"),
        where("proyectoId", "==", proyectoId),
        orderBy("fecha", "desc")
    );

    const snapshot = await getDocs(q);

    let datos = [];

    snapshot.forEach(doc => {
        const d = doc.data();

        datos.push({
            Fecha: d.fecha?.seconds
                ? new Date(d.fecha.seconds * 1000).toLocaleString()
                : "",
            Observación: d.observacion || "",
            Tarea: d.tarea || "",
            Dolores: d.dolores || "",
            Anexos: d.anexos || ""
        });
    });

    const ws = XLSX.utils.json_to_sheet(datos);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Bitacora");

    XLSX.writeFile(wb, "bitacora.xlsx");
};

// EVENTO CAMBIO PROYECTO
document.getElementById("proyectoSelect")
    .addEventListener("change", cargarRegistros);

// INIT
cargarProyectos();

</script>

</body>
</html>
